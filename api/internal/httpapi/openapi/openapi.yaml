openapi: 3.0.3
info:
  title: splatmaker viewer api
  version: 1.0.0
servers:
  - url: /
paths:
  /healthz:
    get:
      operationId: healthz
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /v1/jobs:
    get:
      operationId: listJobs
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 200
        - in: query
          name: offset
          schema:
            type: integer
            minimum: 0
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/JobStatus'
      responses:
        '200':
          description: list jobs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListJobsResponse'
  /v1/jobs/{job_id}:
    get:
      operationId: getJob
      parameters:
        - in: path
          name: job_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: job details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobDetails'
  /v1/jobs/{job_id}/result-urls:
    get:
      operationId: getJobResultUrls
      parameters:
        - in: path
          name: job_id
          required: true
          schema:
            type: string
        - in: query
          name: ttl_seconds
          schema:
            type: integer
            minimum: 60
            maximum: 86400
      responses:
        '200':
          description: signed urls
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobResultURLsResponse'
components:
  schemas:
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    JobStatus:
      type: string
      enum: [queued, running, succeeded, failed, canceled]
    JobSummary:
      type: object
      required: [job_id, status, created_at, updated_at]
      properties:
        job_id: { type: string }
        status: { $ref: '#/components/schemas/JobStatus' }
        progress_percent: { type: integer, minimum: 0, maximum: 100 }
        current_step: { type: string }
        idempotency_key: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    OutputFileRef:
      type: object
      required: [key, file_name]
      properties:
        key: { type: string }
        file_name: { type: string }
        size_bytes: { type: integer }
    JobDetails:
      type: object
      required: [summary, attempt, source_ref, output_files]
      properties:
        summary: { $ref: '#/components/schemas/JobSummary' }
        attempt: { type: integer }
        source_ref: { type: string }
        simulate_failure: { type: boolean }
        error_message: { type: string }
        started_at: { type: string, format: date-time }
        finished_at: { type: string, format: date-time }
        last_heartbeat_at: { type: string, format: date-time }
        output_files:
          type: array
          items: { $ref: '#/components/schemas/OutputFileRef' }
    ListJobsResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/JobSummary' }
    JobResultURL:
      type: object
      required: [key, file_name, url, expires_at]
      properties:
        key: { type: string }
        file_name: { type: string }
        url: { type: string }
        expires_at: { type: string, format: date-time }
    JobResultURLsResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/JobResultURL' }
